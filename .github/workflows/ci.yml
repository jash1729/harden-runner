name: CI Demo with Harden Runner

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest

    steps:
      # Step 1: checkout repo
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      # Step 2: Harden Runner (this is the security layer)
      - name: Harden-Runner
        uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      # Step 3: simple test command
      - name: Run demo command
        run: |
          echo "Hello from CI"
          curl https://www.hello-world.com
