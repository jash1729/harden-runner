name: CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Harden CI runner (security layer)
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      # 3. Setup Node.js (adjust version if needed)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 4. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 5. Run lint (optional but recommended)
      - name: Run lint
        run: npm run lint || echo "No lint script found"

      # 6. Run tests
      - name: Run tests
        run: npm test || echo "No tests defined"

      # 7. Build project (if applicable)
      - name: Build project
        run: npm run build || echo "No build step defined"

      # 8. Print success message
      - name: CI Complete
        run: echo "Build pipeline completed successfully"
