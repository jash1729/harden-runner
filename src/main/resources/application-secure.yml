spring:
  application:
    name: owasp

  datasource:
    url: jdbc:h2:file:./data/securedb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false

  security:
    user:
      name: disabled
      password: disabled

server:
  port: 8081

logging:
  level:
    org:
      springframework:
        security: INFO